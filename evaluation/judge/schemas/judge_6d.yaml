name: judge_6d
report_type: ah_judge_report_v2
prompt_file: evaluation/judge/prompts/judge_6d.md
prompt_version: ah_judge_v2
max_total: 8
default_max_tokens: 1200
response_instruction: Evaluate OUTPUT on the 6 dimensions. Respond only with JSON.
score_schema:
  total_rule: sum of six dimensions; model-provided total is stored as model_total only
blocks:
  main:
    label: Six-dimension judge
    dimensions:
      - d1_lexical_markers
      - d2_structural_patterns
      - d3_naturalness
      - d4_semantic_faithfulness
      - d5_terminology_accuracy
      - d6_edit_value
dimensions:
  - name: d1_lexical_markers
    min: 0
    max: 1
  - name: d2_structural_patterns
    min: 0
    max: 1
  - name: d3_naturalness
    min: 0
    max: 2
  - name: d4_semantic_faithfulness
    min: 0
    max: 2
  - name: d5_terminology_accuracy
    min: 0
    max: 1
  - name: d6_edit_value
    min: 0
    max: 1
hard_fail:
  any_below: []
