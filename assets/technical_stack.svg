<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Academic Humanize technical stack</title>
  <desc id="desc">Technical stack covering data construction, post-training, preference optimization, and evaluation.</desc>
  <defs>
