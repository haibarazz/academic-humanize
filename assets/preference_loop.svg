<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SPIN-style preference tuning loop</title>
  <desc id="desc">Loop for building DPO preference pairs from model predictions and human references.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#F7F3E3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12343B"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <text x="58" y="66" fill="#F7F3E3" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">Self-Generated Preference Pairs</text>
  <text x="60" y="102" fill="#C8D6CE" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="18">Human references become winners; current model outputs become challengers.</text>
  <g font-family="Avenir Next, Helvetica, Arial, sans-serif">
    <g transform="translate(80 172)">
      <rect width="185" height="104" rx="22" fill="#F7F3E3"/>
      <text x="28" y="42" fill="#101820" font-size="20" font-weight="800">Academic input</text>
      <text x="28" y="70" fill="#41534A" font-size="15">AI-like draft</text>
    </g>
    <path d="M276 224H368" stroke="#F7F3E3" stroke-width="3" marker-end="url(#arrow)" opacity="0.8"/>
    <g transform="translate(382 172)">
      <rect width="185" height="104" rx="22" fill="#6BCB77"/>
      <text x="28" y="42" fill="#101820" font-size="20" font-weight="800">Current model</text>
      <text x="28" y="70" fill="#12343B" font-size="15">generate response</text>
    </g>
    <path d="M578 224H670" stroke="#F7F3E3" stroke-width="3" marker-end="url(#arrow)" opacity="0.8"/>
    <g transform="translate(684 138)">
      <rect width="228" height="172" rx="24" fill="#F2C14E"/>
      <text x="28" y="46" fill="#101820" font-size="21" font-weight="800">Preference pair</text>
      <text x="28" y="84" fill="#101820" font-size="16">Winner: human reference</text>
      <text x="28" y="114" fill="#101820" font-size="16">Challenger: model output</text>
      <text x="28" y="148" fill="#2D4F44" font-size="13">same input, different quality</text>
    </g>
    <path d="M924 224H1016" stroke="#F7F3E3" stroke-width="3" marker-end="url(#arrow)" opacity="0.8"/>
    <g transform="translate(1030 172)">
      <rect width="110" height="104" rx="22" fill="#F7F3E3" fill-opacity="0.12" stroke="#F7F3E3" stroke-opacity="0.28"/>
      <text x="24" y="42" fill="#F7F3E3" font-size="20" font-weight="800">Aligned</text>
      <text x="24" y="70" fill="#C8D6CE" font-size="15">adapter</text>
    </g>
    <path d="M1085 288C1020 360 520 376 448 292" stroke="#6BCB77" stroke-width="4" stroke-linecap="round" opacity="0.8" marker-end="url(#arrow)"/>
    <text x="540" y="360" fill="#DDE7DA" font-size="15" font-weight="700">iterate with stronger model outputs</text>
  </g>
</svg>
