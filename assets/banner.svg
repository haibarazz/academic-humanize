<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Academic Humanize</title>
  <desc id="desc">Banner for Academic Humanize, a pipeline for SFT, DPO and evaluation of academic rewriting models.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101820"/>
      <stop offset="0.54" stop-color="#12343B"/>
      <stop offset="1" stop-color="#2D4F44"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="80" x2="1020" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2C14E"/>
      <stop offset="1" stop-color="#6BCB77"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <circle cx="1025" cy="74" r="104" fill="#F2C14E" opacity="0.16" filter="url(#soft)"/>
  <circle cx="150" cy="300" r="140" fill="#6BCB77" opacity="0.12" filter="url(#soft)"/>
