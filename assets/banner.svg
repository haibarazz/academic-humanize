    <text x="24" y="25" fill="#101820">QLoRA</text>
    <rect x="142" y="0" width="108" height="38" rx="19" fill="#6BCB77" opacity="0.95"/>
    <text x="171" y="25" fill="#101820">DPO</text>
    <rect x="268" y="0" width="170" height="38" rx="19" fill="#F7F3E3" opacity="0.95"/>
    <text x="294" y="25" fill="#101820">LLM Judge</text>
    <rect x="456" y="0" width="160" height="38" rx="19" fill="#DDE7DA" opacity="0.95"/>
