<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Academic Humanize Pipeline</title>
  <desc id="desc">Pipeline from corpus, data construction, SFT, DPO, prediction, metrics and LLM-as-Judge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3E3"/>
      <stop offset="1" stop-color="#E6EFE7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#12343B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <text x="60" y="62" fill="#101820" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">Training and Evaluation Pipeline</text>
  <text x="62" y="94" fill="#41534A" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="18">A clean split between data construction, post-training, prediction, metrics, and judge evaluation.</text>
  <g font-family="Avenir Next, Helvetica, Arial, sans-serif">
    <g transform="translate(56 150)">
      <rect width="150" height="100" rx="20" fill="#12343B"/>
      <text x="24" y="38" fill="#F7F3E3" font-size="18" font-weight="700">Academic</text>
      <text x="24" y="64" fill="#F7F3E3" font-size="18" font-weight="700">Corpus</text>
      <text x="24" y="86" fill="#C8D6CE" font-size="13">private source</text>
    </g>
    <path d="M216 200H282" stroke="#12343B" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(292 150)">
      <rect width="170" height="100" rx="20" fill="#2D4F44"/>
      <text x="22" y="38" fill="#F7F3E3" font-size="18" font-weight="700">AH V2</text>
      <text x="22" y="64" fill="#F7F3E3" font-size="18" font-weight="700">Pairs</text>
      <text x="22" y="86" fill="#C8D6CE" font-size="13">input → output</text>
    </g>
    <path d="M472 200H538" stroke="#12343B" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(548 150)">
      <rect width="150" height="100" rx="20" fill="#6BCB77"/>
      <text x="28" y="42" fill="#101820" font-size="20" font-weight="800">SFT</text>
      <text x="28" y="70" fill="#12343B" font-size="15" font-weight="600">Qwen2.5 LoRA</text>
    </g>
    <path d="M708 200H774" stroke="#12343B" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(784 150)">
      <rect width="160" height="100" rx="20" fill="#F2C14E"/>
      <text x="28" y="42" fill="#101820" font-size="20" font-weight="800">DPO</text>
      <text x="28" y="70" fill="#12343B" font-size="15" font-weight="600">iterative preference</text>
    </g>
    <path d="M954 200H1020" stroke="#12343B" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(1030 150)">
      <rect width="120" height="100" rx="20" fill="#101820"/>
      <text x="22" y="42" fill="#F7F3E3" font-size="19" font-weight="800">LoRA</text>
      <text x="22" y="70" fill="#C8D6CE" font-size="14">adapters</text>
    </g>
    <g transform="translate(224 300)">
      <rect width="184" height="70" rx="18" fill="#FFFFFF" stroke="#D4DED7"/>
      <text x="24" y="31" fill="#101820" font-size="17" font-weight="800">Prediction</text>
      <text x="24" y="53" fill="#41534A" font-size="13">local + API baselines</text>
    </g>
    <path d="M548 320H418" stroke="#12343B" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(508 300)">
      <rect width="184" height="70" rx="18" fill="#FFFFFF" stroke="#D4DED7"/>
      <text x="24" y="31" fill="#101820" font-size="17" font-weight="800">Metrics</text>
      <text x="24" y="53" fill="#41534A" font-size="13">BERTScore / chrF++</text>
    </g>
    <g transform="translate(792 300)">
      <rect width="184" height="70" rx="18" fill="#FFFFFF" stroke="#D4DED7"/>
      <text x="24" y="31" fill="#101820" font-size="17" font-weight="800">LLM Judge</text>
      <text x="24" y="53" fill="#41534A" font-size="13">6 dimensions / 8 pts</text>
    </g>
    <path d="M698 320H782" stroke="#12343B" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
</svg>
